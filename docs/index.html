<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "pandas", "plotly"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Forecasting Lab の Streamlit エントリポイント。\n\nUI は薄く保ち、予測・評価ロジックは forecasting_lab パッケージ(src/) に委譲する。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport io\nimport sys\nfrom pathlib import Path\n\n# src/ 配下のパッケージをインポート可能にする（未インストール環境でも動作する保险）\n_SRC = Path(__file__).resolve().parent.parent / \"src\"\nif str(_SRC) not in sys.path:\n    sys.path.insert(0, str(_SRC))\n\nimport numpy as np\nimport pandas as pd\nimport plotly.graph_objects as go\nimport streamlit as st\n\nfrom forecasting_lab import data as ds\nfrom forecasting_lab.metrics import evaluate\nfrom forecasting_lab.models import LinearTrendModel, MovingAverageModel, NaiveModel\n\nst.set_page_config(page_title=\"Forecasting Lab\", page_icon=\"📈\", layout=\"centered\")\n\n# モデル表示名 -> 生成器（窓幅 w を受け取る）\nMODEL_BUILDERS = {\n    \"Naive\": lambda w: NaiveModel(),\n    \"Moving Average\": lambda w: MovingAverageModel(window=w),\n    \"Linear Trend\": lambda w: LinearTrendModel(),\n}\nMODEL_COLORS = {\n    \"Naive\": (\"#1f77b4\", \"rgba(31,119,180,0.15)\"),\n    \"Moving Average\": (\"#2ca02c\", \"rgba(44,160,44,0.15)\"),\n    \"Linear Trend\": (\"#d62728\", \"rgba(214,39,40,0.15)\"),\n}\nZ_BY_LEVEL = {\"80%\": 1.28, \"90%\": 1.645, \"95%\": 1.96}\nDATASET_OPTIONS = ds.DATASET_NAMES + [\"Upload CSV\"]\n\n\n@st.cache_data(show_spinner=False)\ndef get_dataset(name: str, n: int, seed: int, file_bytes: bytes | None) -> pd.DataFrame | None:\n    \"\"\"データセットを取得する。CSV の場合はバイト列から復元する。\"\"\"\n    if name == \"Upload CSV\":\n        if not file_bytes:\n            return None\n        df = pd.read_csv(io.BytesIO(file_bytes))\n        if df.shape[1] < 2:\n            return None\n        df = df[[df.columns[0], df.columns[1]]].copy()\n        df.columns = [\"date\", \"value\"]\n        df[\"date\"] = pd.to_datetime(df[\"date\"], errors=\"coerce\")\n        df[\"value\"] = pd.to_numeric(df[\"value\"], errors=\"coerce\")\n        df = df.dropna(subset=[\"date\"]).sort_values(\"date\").reset_index(drop=True)\n        return df\n    return ds.load_dataset(name, n=n, seed=seed)\n\n\n@st.cache_data(show_spinner=False)\ndef run_forecast(\n    values: tuple[float, ...],\n    n_train: int,\n    ma_window: int,\n    model_names: tuple[str, ...],\n    z: float,\n) -> dict:\n    \"\"\"選択されたモデルで予測を実行し、予測値・区間・評価指標・残差を返す。\"\"\"\n    arr = np.asarray(values, dtype=float)\n    results: dict[str, dict] = {}\n    for mname in model_names:\n        builder = MODEL_BUILDERS[mname]\n        try:\n            model = builder(ma_window).fit(arr[:n_train])\n        except ValueError as exc:\n            results[mname] = {\"error\": str(exc)}\n            continue\n        horizon = arr.size - n_train\n        mean, lower, upper = model.predict_interval(horizon, z=z)\n        y_test = arr[n_train:]\n        results[mname] = {\n            \"in_sample\": model.predict_in_sample(),\n            \"forecast\": mean,\n            \"lower\": lower,\n            \"upper\": upper,\n            \"metrics\": evaluate(y_test, mean),\n            \"residuals\": y_test - mean,\n        }\n    return results\n\n\ndef _format_metric(val: float) -> str:\n    if not np.isfinite(val):\n        return \"—\"\n    return f\"{val:.3f}\"\n\n\n# --------------------------------------------------------------------- UI\nfrom forecasting_lab.brand import apply_brand, hero\napply_brand(st)\nhero(st, \"Time Series Forecasting\", \"Forecasting Lab\", \"単純な時系列予測モデルを比較し、予測精度と予測区間を可視化します。\")\nst.caption(\"単純な時系列予測モデルを比較し、予測精度と予測区間を可視化する小型アプリ\")\n\nwith st.sidebar:\n    st.header(\"設定\")\n    data_source = st.selectbox(\"データセット\", DATASET_OPTIONS)\n    file_bytes: bytes | None = None\n    if data_source == \"Upload CSV\":\n        up = st.file_uploader(\"CSV をアップロード（先頭2列: date, value）\", type=[\"csv\"])\n        if up is not None:\n            file_bytes = up.getvalue()\n    is_synth = data_source != \"Upload CSV\"\n    n_points = st.slider(\"データ数\", 36, 240, 120, step=12, disabled=not is_synth)\n    seed = st.number_input(\"乱数シード\", 0, 100, 0, disabled=not is_synth)\n    test_size = st.slider(\"評価期間の割合\", 0.1, 0.5, 0.25, 0.05)\n    ma_window = st.number_input(\"Moving Average の窓幅\", 1, 24, 3)\n    conf = st.selectbox(\"予測区間の信頼水準\", list(Z_BY_LEVEL.keys()), index=2)\n    models = st.multiselect(\n        \"予測モデル\", list(MODEL_BUILDERS.keys()), default=list(MODEL_BUILDERS.keys())\n    )\n\nz = Z_BY_LEVEL[conf]\n\ndf = get_dataset(data_source, int(n_points), int(seed), file_bytes)\nif df is None or df.empty:\n    st.warning(\"データがありません。CSV をアップロードするか、データセットを選択してください。\")\n    st.stop()\n\nvalues = df[\"value\"].to_numpy(dtype=float)\nn = len(values)\nvalid_count = int(np.isfinite(values).sum())\n\nif valid_count < 2:\n    st.error(\"有効な観測値が2件未満です。別のデータセットまたはCSVを使用してください。\")\n    st.stop()\n\nn_train = max(1, int(n * (1 - test_size)))\nif n_train >= n:\n    st.error(\"評価期間が確保できません。データ数を増やすか、評価期間の割合を下げてください。\")\n    st.stop()\n\nif valid_count < n:\n    st.info(f\"欠損値を含むデータです（有効 {valid_count}/{n} 件）。予測時は前方補完で扱います。\")\n\nif not models:\n    st.info(\"左サイドバーから予測モデルを1つ以上選択してください。\")\n    st.stop()\n\ndates = df[\"date\"].to_numpy()\ntrain_dates, test_dates = dates[:n_train], dates[n_train:]\nresults = run_forecast(\n    tuple(values.tolist()), n_train, int(ma_window), tuple(models), float(z)\n)\n\n# --- データプレビュー\nwith st.expander(\"データプレビュー\", expanded=False):\n    st.dataframe(df.assign(value=df[\"value\"].round(3)), use_container_width=True)\n\n# --- 予測グラフ\nst.subheader(\"予測グラフ（学習期間 / 評価期間 / 予測区間）\")\nfig = go.Figure()\nfig.add_trace(\n    go.Scatter(\n        x=train_dates, y=values[:n_train], name=\"学習（実測）\",\n        mode=\"lines+markers\", line=dict(color=\"#9aa0a6\", width=2),\n    )\n)\nfig.add_trace(\n    go.Scatter(\n        x=test_dates, y=values[n_train:], name=\"評価（実測）\",\n        mode=\"lines+markers\", line=dict(color=\"#202124\", width=2),\n    )\n)\nfor mname, res in results.items():\n    if \"error\" in res:\n        continue\n    line_color, fill_color = MODEL_COLORS[mname]\n    fig.add_trace(\n        go.Scatter(\n            x=test_dates, y=res[\"upper\"], name=f\"{mname} 上限\",\n            mode=\"lines\", line=dict(width=0), showlegend=False, hoverinfo=\"skip\",\n        )\n    )\n    fig.add_trace(\n        go.Scatter(\n            x=test_dates, y=res[\"lower\"], name=f\"{mname} 下限\",\n            mode=\"lines\", line=dict(width=0), fill=\"tonexty\", fillcolor=fill_color,\n            showlegend=False, hoverinfo=\"skip\",\n        )\n    )\n    fig.add_trace(\n        go.Scatter(\n            x=test_dates, y=res[\"forecast\"], name=f\"{mname} 予測\",\n            mode=\"lines+markers\", line=dict(color=line_color, width=2.5),\n        )\n    )\nfig.update_layout(\n    xaxis_title=\"日付\", yaxis_title=\"値\",\n    legend=dict(orientation=\"h\", yanchor=\"bottom\", y=1.02, xanchor=\"right\", x=1),\n    margin=dict(l=10, r=10, t=40, b=10),\n    height=420,\n)\nst.plotly_chart(fig, use_container_width=True)\n\n# --- 評価指標\nst.subheader(\"評価指標（評価期間）\")\nrows = []\nfor mname, res in results.items():\n    if \"error\" in res:\n        rows.append({\"モデル\": mname, \"MAE\": \"—\", \"RMSE\": \"—\", \"備考\": res[\"error\"]})\n    else:\n        m = res[\"metrics\"]\n        rows.append(\n            {\n                \"モデル\": mname,\n                \"MAE\": _format_metric(m[\"MAE\"]),\n                \"RMSE\": _format_metric(m[\"RMSE\"]),\n                \"備考\": \"\",\n            }\n        )\nmetrics_df = pd.DataFrame(rows)\nst.dataframe(metrics_df, use_container_width=True, hide_index=True)\n\nst.download_button(\n    \"評価指標をCSVでダウンロード\",\n    metrics_df.to_csv(index=False).encode(\"utf-8\"),\n    file_name=\"forecasting_metrics.csv\",\n    mime=\"text/csv\",\n)\n\n# --- 残差プロット\nst.subheader(\"残差プロット（評価期間）\")\nfig2 = go.Figure()\nfor mname, res in results.items():\n    if \"error\" in res:\n        continue\n    fig2.add_trace(\n        go.Scatter(\n            x=test_dates, y=res[\"residuals\"], name=f\"{mname} 残差\",\n            mode=\"lines+markers\",\n        )\n    )\nfig2.add_hline(y=0, line_dash=\"dash\", line_color=\"#9aa0a6\")\nfig2.update_layout(\n    xaxis_title=\"日付\", yaxis_title=\"残差\",\n    legend=dict(orientation=\"h\", yanchor=\"bottom\", y=1.02, xanchor=\"right\", x=1),\n    margin=dict(l=10, r=10, t=40, b=10),\n    height=320,\n)\nst.plotly_chart(fig2, use_container_width=True)\n\nst.caption(\n    \"本アプリは単純モデルの比較を目的としており、実運用の予測精度を保証するものではありません。\"\n)\n", "src/forecasting_lab/__init__.py": "\"\"\"forecasting-lab: 時系列予測モデルの比較と評価モジュール。\"\"\"\n\nfrom .data import DATASET_NAMES, load_csv, load_dataset\nfrom .metrics import evaluate, mae, rmse\nfrom .models import (\n    ForecastModel,\n    LinearTrendModel,\n    MovingAverageModel,\n    NaiveModel,\n)\n\n__all__ = [\n    \"DATASET_NAMES\",\n    \"ForecastModel\",\n    \"LinearTrendModel\",\n    \"MovingAverageModel\",\n    \"NaiveModel\",\n    \"evaluate\",\n    \"load_csv\",\n    \"load_dataset\",\n    \"mae\",\n    \"rmse\",\n]\n\n__version__ = \"0.1.0\"\n", "src/forecasting_lab/brand.py": "\"\"\"portfolio-hub と視覚言語を揃える共通ブランドテーマ（Streamlit 用）。\n\n- near-white グラデ背景 / slate 文字 / teal・blue アクセント\n- 半透明の白カード + blur / 8px 角丸 / uppercase キッカー + 大きな見出し\n\n外部依存なし。各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero\n    apply_brand(st)          # set_page_config の後に一度だけ\n    hero(st, \"Kicker\", \"タイトル\", \"サブ説明\")\n\"\"\"\n\nfrom __future__ import annotations\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');\n\n:root {\n  --bg:#f8fafc; --fg:#0f172a; --muted:rgba(15,23,42,0.66);\n  --surface:rgba(255,255,255,0.82); --line:rgba(15,23,42,0.12);\n  --accent:#0f766e; --accent2:#2563eb;\n  --shadow:0 18px 50px rgba(15,23,42,0.08);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li, span, label,\nh1, h2, h3, h4, button, input, textarea, select,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricLabel\"],\n[data-testid=\"stWidgetLabel\"] {\n  font-family: 'Inter', system-ui, -apple-system, \"Segoe UI\", sans-serif;\n}\n\n/* 背景グラデ（portfolio-hub .portfolio-shell 相当） */\n.stApp {\n  background:\n    linear-gradient(180deg, rgba(248,250,252,0.92), rgba(241,245,249,0.96) 42%, rgba(15,23,42,0.05)),\n    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.95), rgba(219,234,254,0.55) 42%, rgba(15,23,42,0.06));\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.2rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 800 !important; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\nh3 { font-weight: 700 !important; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 6px 0 30px; }\n.brand-kicker {\n  color: var(--accent); font-size: .78rem; font-weight: 700;\n  letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-size: clamp(2.1rem, 5vw, 3.5rem); font-weight: 800;\n  line-height: 1.03; letter-spacing: -0.025em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1.02rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n\n/* サイドバー = 半透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: rgba(255,255,255,0.72); backdrop-filter: blur(16px);\n  border-right: 1px solid var(--line);\n}\n[data-testid=\"stSidebar\"] .brand-kicker { margin-top: 4px; }\n\n/* metric をカード化 */\n[data-testid=\"stMetric\"] {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow);\n  backdrop-filter: blur(12px);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 800; }\n[data-testid=\"stMetricLabel\"] { color: var(--muted); }\n\n/* ボタン = ダークプライマリ */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 8px; border: 1px solid #0f172a; background: #0f172a;\n  color: #fff; font-weight: 700; padding: 8px 16px;\n  transition: transform .15s ease, background .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: #020617; transform: translateY(-1px); border-color: #0f172a; color: #fff;\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 6px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 700; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--fg); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 8px !important; }\n\n/* 通知・区切り */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\n</style>\n\"\"\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(st, kicker: str, title: str, subtitle: str | None = None) -> None:\n    \"\"\"portfolio-hub 風のヒーロー見出し（キッカー + 大見出し + サブ説明）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n", "src/forecasting_lab/data.py": "\"\"\"データセット読み込み（合成データ生成 + CSV アップロード）。\n\n本モジュールが扱うデータはすべて合成データ（またはユーザー任意のCSV）であり、\n外部の公開データセットには依存しない。そのため出典/ライセンスの記載は不要。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport numpy as np\nimport pandas as pd\n\nDATASET_NAMES: list[str] = [\n    \"synthetic_trend_seasonal\",\n    \"synthetic_trend_only\",\n    \"synthetic_with_missing\",\n    \"synthetic_noisy_level\",\n]\n\n\ndef _dates(n: int, start: str = \"2018-01-01\", freq: str = \"MS\") -> pd.DatetimeIndex:\n    \"\"\"n 期間分の月次タイムスタンプを返す。\"\"\"\n    return pd.date_range(start=start, periods=n, freq=freq)\n\n\ndef _frame(values: np.ndarray, start: str = \"2018-01-01\", freq: str = \"MS\") -> pd.DataFrame:\n    \"\"\"1次元配列を date/value 列の DataFrame に整形する。\"\"\"\n    n = int(len(values))\n    return pd.DataFrame({\"date\": _dates(n, start, freq), \"value\": values.astype(float)})\n\n\ndef synthetic_trend_seasonal(\n    n: int = 120, seed: int = 0, trend: float = 0.05, season_amp: float = 3.0, noise: float = 1.0\n) -> pd.DataFrame:\n    \"\"\"トレンド + 季節性(周期12) + ノイズの合成月次系列。\"\"\"\n    rng = np.random.default_rng(seed)\n    t = np.arange(n)\n    seasonal = season_amp * np.sin(2.0 * np.pi * t / 12.0)\n    series = 10.0 + trend * t + seasonal + noise * rng.standard_normal(n)\n    return _frame(series)\n\n\ndef synthetic_trend_only(\n    n: int = 120, seed: int = 0, trend: float = 0.1, noise: float = 0.5\n) -> pd.DataFrame:\n    \"\"\"トレンドのみの合成月次系列。\"\"\"\n    rng = np.random.default_rng(seed)\n    t = np.arange(n)\n    series = 10.0 + trend * t + noise * rng.standard_normal(n)\n    return _frame(series)\n\n\ndef synthetic_with_missing(\n    n: int = 120, seed: int = 0, missing_frac: float = 0.1\n) -> pd.DataFrame:\n    \"\"\"欠損値を意図的に混入した合成月次系列（堅牢性確認用）。\"\"\"\n    df = synthetic_trend_seasonal(n=n, seed=seed)\n    rng = np.random.default_rng(seed + 1)\n    mask = rng.random(n) < missing_frac\n    df.loc[mask, \"value\"] = np.nan\n    return df\n\n\ndef synthetic_noisy_level(n: int = 120, seed: int = 0, noise: float = 2.0) -> pd.DataFrame:\n    \"\"\"トレンドなしの水平+ノイズ系列。\"\"\"\n    rng = np.random.default_rng(seed)\n    series = 10.0 + noise * rng.standard_normal(n)\n    return _frame(series)\n\n\n_GENERATORS = {\n    \"synthetic_trend_seasonal\": synthetic_trend_seasonal,\n    \"synthetic_trend_only\": synthetic_trend_only,\n    \"synthetic_with_missing\": synthetic_with_missing,\n    \"synthetic_noisy_level\": synthetic_noisy_level,\n}\n\n\ndef load_dataset(name: str, n: int = 120, seed: int = 0) -> pd.DataFrame:\n    \"\"\"名前で合成データセットを生成して返す。未知の名前は ValueError。\"\"\"\n    if name not in _GENERATORS:\n        raise ValueError(f\"unknown dataset: {name}\")\n    if n < 2:\n        raise ValueError(\"n must be >= 2\")\n    return _GENERATORS[name](n=n, seed=seed)\n\n\ndef load_csv(path: str | Path) -> pd.DataFrame:\n    \"\"\"ユーザー任意のCSVを読み込む。先頭2列を (date, value) として扱う。\n\n    日付は可能な限り datetime に変換し、値は数値化する。\n    \"\"\"\n    p = Path(path)\n    df = pd.read_csv(p)\n    if df.shape[1] < 2:\n        raise ValueError(\"CSV must have at least 2 columns: date, value\")\n    date_col, val_col = df.columns[0], df.columns[1]\n    df = df[[date_col, val_col]].copy()\n    df.columns = [\"date\", \"value\"]\n    df[\"date\"] = pd.to_datetime(df[\"date\"], errors=\"coerce\")\n    df[\"value\"] = pd.to_numeric(df[\"value\"], errors=\"coerce\")\n    df = df.dropna(subset=[\"date\"]).sort_values(\"date\").reset_index(drop=True)\n    return df\n", "src/forecasting_lab/metrics.py": "\"\"\"予測精度評価指標（MAE / RMSE）。欠損値を含むデータでも落ちない。\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\nimport pandas as pd\n\n\ndef _to_array(x) -> np.ndarray:\n    \"\"\"Series/配列を 1次元 float 配列に正規化する。\"\"\"\n    if isinstance(x, pd.Series):\n        return x.to_numpy(dtype=float)\n    return np.asarray(x, dtype=float).ravel()\n\n\ndef _validate_pair(y_true, y_pred) -> tuple[np.ndarray, np.ndarray]:\n    \"\"\"2つの配列の長期を検証し、float 配列として返す。\"\"\"\n    yt = _to_array(y_true)\n    yp = _to_array(y_pred)\n    if yt.shape[0] != yp.shape[0]:\n        raise ValueError(f\"length mismatch: y_true={yt.shape[0]} y_pred={yp.shape[0]}\")\n    return yt, yp\n\n\ndef _valid_mask(yt: np.ndarray, yp: np.ndarray) -> np.ndarray:\n    \"\"\"両側が有限（NaN/inf でない）のペアを示すマスク。\"\"\"\n    return np.isfinite(yt) & np.isfinite(yp)\n\n\ndef mae(y_true, y_pred) -> float:\n    \"\"\"平均絶対誤差。有効ペアが無い場合は NaN を返す。\"\"\"\n    yt, yp = _validate_pair(y_true, y_pred)\n    mask = _valid_mask(yt, yp)\n    if not mask.any():\n        return float(\"nan\")\n    return float(np.mean(np.abs(yt[mask] - yp[mask])))\n\n\ndef rmse(y_true, y_pred) -> float:\n    \"\"\"二乗平均平方根誤差。有効ペアが無い場合は NaN を返す。\"\"\"\n    yt, yp = _validate_pair(y_true, y_pred)\n    mask = _valid_mask(yt, yp)\n    if not mask.any():\n        return float(\"nan\")\n    return float(np.sqrt(np.mean((yt[mask] - yp[mask]) ** 2)))\n\n\ndef evaluate(y_true, y_pred) -> dict[str, float]:\n    \"\"\"MAE と RMSE をまとめて返す。\"\"\"\n    return {\"MAE\": mae(y_true, y_pred), \"RMSE\": rmse(y_true, y_pred)}\n", "src/forecasting_lab/models.py": "\"\"\"予測モデル: Naive / Moving Average / Linear Trend。\n\nすべてのモデルは欠損値を含む入力でも例外を投げずに動作する（全欠損時のみ ValueError）。\n予測区間は学習データの in-sample 残差標準偏差を用いた対称バンドで近似する。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom abc import ABC, abstractmethod\n\nimport numpy as np\nimport pandas as pd\n\n\ndef _to_array(x) -> np.ndarray:\n    if isinstance(x, pd.Series):\n        return x.to_numpy(dtype=float)\n    return np.asarray(x, dtype=float).ravel()\n\n\ndef _has_valid(y: np.ndarray) -> bool:\n    return bool(np.isfinite(y).any())\n\n\ndef _filled(y: np.ndarray) -> np.ndarray:\n    \"\"\"NaN を前方補完した配列を返す（先頭の連続 NaN はそのまま）。\"\"\"\n    return pd.Series(y).ffill().to_numpy(dtype=float)\n\n\ndef _resid_std(observed: np.ndarray, fitted: np.ndarray) -> float:\n    \"\"\"両者が有限の箇所の残差標準偏差。2点未満なら 0。\"\"\"\n    mask = np.isfinite(observed) & np.isfinite(fitted)\n    if mask.sum() < 2:\n        return 0.0\n    return float(np.std(observed[mask] - fitted[mask], ddof=0))\n\n\nclass ForecastModel(ABC):\n    \"\"\"予測モデルの共通インターフェース。\"\"\"\n\n    name: str = \"base\"\n\n    @abstractmethod\n    def fit(self, y) -> \"ForecastModel\":\n        \"\"\"学習系列を与えてモデルを適合させる。\"\"\"\n\n    @abstractmethod\n    def predict_in_sample(self) -> np.ndarray:\n        \"\"\"学習期間に対する当てはめ値（1期前シフトベース）を返す。\"\"\"\n\n    @abstractmethod\n    def predict(self, horizon: int) -> np.ndarray:\n        \"\"\"horizon 期間分の将来予測を返す。\"\"\"\n\n    def residual_std(self) -> float:\n        \"\"\"in-sample 残差の標準偏差（予測区間用）。\"\"\"\n        raise NotImplementedError\n\n    def predict_interval(self, horizon: int, z: float = 1.96):\n        \"\"\"予測値と z*residual_std の対称区間を返す。\n\n        Returns:\n            (mean, lower, upper) -- いずれも長さ horizon の配列。\n        \"\"\"\n        horizon = max(0, int(horizon))\n        mean = self.predict(horizon)\n        sd = self.residual_std()\n        if not np.isfinite(sd) or sd <= 0:\n            sd = 0.0\n        lower = mean - z * sd\n        upper = mean + z * sd\n        return mean, lower, upper\n\n\nclass NaiveModel(ForecastModel):\n    \"\"\"ナイーブ予測: 直前の値をそのまま将来へ引き伸ばす。\"\"\"\n\n    name = \"Naive\"\n\n    def fit(self, y) -> \"NaiveModel\":\n        y = _to_array(y)\n        if y.size == 0 or not _has_valid(y):\n            raise ValueError(\"Naive: requires at least one valid observation\")\n        self._y = y\n        self._filled = _filled(y)\n        valid = self._filled[np.isfinite(self._filled)]\n        self._last = float(valid[-1])\n        return self\n\n    def predict_in_sample(self) -> np.ndarray:\n        f = self._filled\n        fitted = np.full_like(f, np.nan)\n        if f.size > 1:\n            fitted[1:] = f[:-1]\n        return fitted\n\n    def predict(self, horizon: int) -> np.ndarray:\n        return np.full(max(0, int(horizon)), self._last)\n\n    def residual_std(self) -> float:\n        return _resid_std(self._filled, self.predict_in_sample())\n\n\nclass MovingAverageModel(ForecastModel):\n    \"\"\"移動平均予測: 直近 window 件の平均を将来へ引き伸ばす。\"\"\"\n\n    name = \"Moving Average\"\n\n    def __init__(self, window: int = 3) -> None:\n        if window < 1:\n            raise ValueError(\"window must be >= 1\")\n        self.window = int(window)\n\n    def fit(self, y) -> \"MovingAverageModel\":\n        y = _to_array(y)\n        if y.size == 0 or not _has_valid(y):\n            raise ValueError(\"MovingAverage: requires at least one valid observation\")\n        self._y = y\n        self._filled = _filled(y)\n        valid_count = int(np.isfinite(self._filled).sum())\n        self._window_used = max(1, min(self.window, valid_count))\n        return self\n\n    def predict_in_sample(self) -> np.ndarray:\n        f = self._filled\n        s = pd.Series(f).rolling(self._window_used, min_periods=1).mean()\n        return s.shift(1).to_numpy(dtype=float)\n\n    def predict(self, horizon: int) -> np.ndarray:\n        h = max(0, int(horizon))\n        valid = self._filled[np.isfinite(self._filled)]\n        if valid.size == 0:\n            return np.full(h, np.nan)\n        base = float(np.mean(valid[-self._window_used :]))\n        return np.full(h, base)\n\n    def residual_std(self) -> float:\n        return _resid_std(self._filled, self.predict_in_sample())\n\n\nclass LinearTrendModel(ForecastModel):\n    \"\"\"線形トレンド予測: OLS で a + b*t を当てはめ、将来へ外挿する。\"\"\"\n\n    name = \"Linear Trend\"\n\n    def fit(self, y) -> \"LinearTrendModel\":\n        y = _to_array(y)\n        if y.size == 0 or not _has_valid(y):\n            raise ValueError(\"LinearTrend: requires at least one valid observation\")\n        self._y = y\n        self._n = y.size\n        t = np.arange(self._n, dtype=float)\n        mask = np.isfinite(y)\n        if mask.sum() < 2:\n            val = float(np.nanmean(y))\n            self._a, self._b = val, 0.0\n        else:\n            slope, intercept = np.polyfit(t[mask], y[mask], 1)\n            self._a, self._b = float(intercept), float(slope)\n        return self\n\n    def predict_in_sample(self) -> np.ndarray:\n        t = np.arange(self._n, dtype=float)\n        return self._a + self._b * t\n\n    def predict(self, horizon: int) -> np.ndarray:\n        h = max(0, int(horizon))\n        t = np.arange(self._n, self._n + h, dtype=float)\n        return self._a + self._b * t\n\n    def residual_std(self) -> float:\n        return _resid_std(self._y, self.predict_in_sample())\n", ".streamlit/config.toml": "[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f8fafc\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0f172a\"\nfont = \"sans serif\"\n"}}, document.getElementById("root"));
</script>
